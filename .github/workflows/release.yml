name: Release

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace the v1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: 29df2ca1dc02f1b6c8cecd8d24c29dc7ca267132
          NOTES: |
            A from-scratch Monte Carlo forecast of the 2026 World Cup, live at https://wc2026forecast.xyz.

            One self-contained `index.html`, no backend and no dependencies. It plays the full 48-team
            tournament (104 matches, the eight best third-placed teams, the official FIFA Annex C
            round-of-32, and the bracket through the final with extra time and penalties) 50,000 times,
            five different ways, then overlays real results as they come in.

            ## Five models, one engine
            Every model shares the same tournament engine and differs only in how it rates a single match.
            - **Pure Elo** — results only, like a chess rating.
            - **Pure Goals** — Dixon-Coles, fit on 15,431 internationals since 2010.
            - **Hybrid** — the average of the two; best on out-of-sample tests.
            - **Hybrid + Market** — the Hybrid blended halfway to the bookmaker-implied ratings.
            - **Pure Market** — the bookmakers' ratings run through the bracket; the default and recommended view.

            ## What it shows
            - **Title Odds** — each team's chance of winning plus a reach-round matrix, against Opta and the
              Bookmakers as outside checks. Once games are played the odds re-condition on results, with a
              Day 0 ghost tick and delta on every bar and a global **Live / Day 0** toggle to rewind the tab.
            - **Schedule** — every fixture by local kickoff time, predicted score vs the real result, color-coded.
            - **Groups & Scores** — the live group table against the predicted finish, with movement arrows.
            - **Knockout Phase** — live reach-round odds now; the predicted-vs-actual bracket once the
              round-of-32 is set.
            - **Top Scorers** — the bookmakers' Golden Boot pick next to a live leaderboard parsed from the feed.
            - **Method & Caveats** — the models, the validation, and the honest weaknesses.
            - **Netherlands / France** — a per-model, game-by-game timeline.

            ## Live and self-updating
            - Real results overlay in the browser from the public openfootball feed (no key, no backend), on one
              adaptive heartbeat that also drives the live scorer leaderboard.
            - A scheduled GitHub Action re-runs the conditional 50,000-sim and redeploys whenever a new result
              lands, so the odds themselves move, not just the overlays.
            - Both stop a week after the final (the sundown cutoff).

            ## Honest by design
            Built and validated entirely from public data. A transparent baseline, not an oracle; nothing in it
            has been tested against a real World Cup. Not betting advice.
        run: |
          gh release delete v1.0 --yes --cleanup-tag 2>/dev/null || true
          printf '%s' "$NOTES" | gh release create v1.0 \
            --title "World Cup 2026 Forecast v1.0" \
            --notes-file - \
            --target "$TARGET"
