name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: index.html is in sync with template and data
        run: python source/build_app.py --check

      - name: App script blocks parse and all five models are present
        run: node source/check_app.js
