    - contentinfo [ref=e175]:
      - text: Five match models (Pure Elo · Dixon-Coles · Hybrid · Model + Market · Pure Market) over a shared Monte Carlo of 50,000 tournaments with the official FIFA Annex C round-of-32 (495 combinations). Dixon-Coles fit by MLE on 15,431 internationals (2010-2026); hybrid weight chosen by out-of-sample log-loss; market odds de-vigged and the pure-market ratings calibrated to them. Opta and Polymarket / Kalshi / FanDuel shown for comparison. Not betting advice.
      - generic [ref=e176]: made with ♥ by François
